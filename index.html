<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HỒNG PHÚC Mobile - Phan Rí Cửa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --main-blue: #00483d; --sub-green: #00b14f; }
        .bg-hoangha { background: var(--main-blue); }
        .text-hoangha { color: var(--sub-green); }
        .sidebar-item:hover { background: #f0fdf4; color: var(--sub-green); }
        .active-cate { background: #00b14f !important; color: white !important; }
        .logo-img { height: 60px; width: auto; object-fit: contain; }
        #drop-zone.dragover { background-color: #ecfdf5; border-color: #10b981; }
    </style>
</head>
<body class="bg-gray-100 font-sans flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-hoangha text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-2 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <img src="logo_hp.png" alt="HỒNG PHÚC Mobile" class="logo-img">
                <div class="hidden md:flex bg-white/10 rounded-full px-4 py-1 text-sm items-center gap-2 font-bold">
                    <i class="fas fa-phone-alt text-green-400"></i> 0949.397.344
                </div>
            </div>

            <div class="flex items-center gap-4">
                <a href="https://www.facebook.com/share/1DLDWmbo84/?mibextid=wwXIfr" target="_blank" class="flex items-center gap-2 bg-[#1877F2] px-3 py-1.5 rounded-lg font-bold text-xs hover:scale-105 transition shadow-lg">
                    <i class="fab fa-facebook-f text-lg"></i>
                    <span class="hidden sm:inline uppercase">Facebook</span>
                </a>
                <button id="btn-toggle-admin" class="hidden bg-yellow-400 text-black px-4 py-1.5 rounded-full font-bold text-xs uppercase shadow-lg hover:scale-105 transition">Admin Control</button>
            </div>
        </div>
    </header>

    <div class="container mx-auto px-4 py-6 flex flex-col md:flex-row gap-6 flex-grow">
        <!-- SIDEBAR -->
        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200 sticky top-24">
                <div class="bg-gray-50 px-4 py-3 font-bold text-gray-700 border-b italic uppercase text-xs tracking-widest">Danh mục cửa hàng</div>
                <nav id="category-menu">
                    <button onclick="filterCate('all')" class="cate-btn active-cate w-full flex items-center gap-3 px-4 py-3 text-sm font-medium sidebar-item transition border-b">
                        <i class="fas fa-th-large w-5"></i> Tất cả sản phẩm
                    </button>
                    <button onclick="filterCate('phone')" class="cate-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium sidebar-item transition border-b">
                        <i class="fas fa-mobile-alt w-5"></i> Điện thoại
                    </button>
                    <button onclick="filterCate('accessory')" class="cate-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium sidebar-item transition border-b">
                        <i class="fas fa-headphones w-5"></i> Phụ kiện / Sạc
                    </button>
                    <button onclick="filterCate('repair')" class="cate-btn w-full flex items-center gap-3 px-4 py-3 text-sm font-medium sidebar-item transition">
                        <i class="fas fa-tools w-5"></i> Sửa chữa / Ép kính
                    </button>
                </nav>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1">
            <!-- ADMIN PANEL -->
            <section id="admin-panel" class="hidden bg-white p-6 rounded-3xl shadow-xl border-2 border-emerald-500 mb-8 overflow-hidden">
                <h3 class="font-bold text-xl mb-4 text-emerald-700 flex items-center gap-2">
                    <i class="fas fa-plus-circle"></i> THÊM HÀNG MỚI VỀ
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-4">
                        <input id="p-name" type="text" placeholder="Tên sản phẩm..." class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-400">
                        <input id="p-price" type="text" placeholder="Giá bán (VD: 15.990.000đ)" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none focus:ring-2 focus:ring-emerald-400">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="p-category" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none">
                                <option value="phone">📱 Điện thoại</option>
                                <option value="accessory">🎧 Phụ kiện</option>
                                <option value="repair">🔧 Sửa chữa</option>
                            </select>
                            <select id="p-status" class="w-full p-4 bg-gray-50 border-none rounded-2xl outline-none font-bold text-emerald-600">
                                <option value="new">Mới 100%</option>
                                <option value="used">Đã qua sử dụng</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="drop-zone" class="relative border-4 border-dashed border-emerald-100 rounded-3xl flex flex-col items-center justify-center p-6 hover:bg-emerald-50 transition cursor-pointer group">
                        <input type="file" id="p-file" class="absolute inset-0 opacity-0 cursor-pointer z-10" accept="image/*">
                        <div id="preview-container" class="text-center group-hover:scale-110 transition">
                            <i class="fas fa-images text-5xl text-emerald-200 mb-2"></i>
                            <p class="text-sm font-black text-emerald-700 uppercase tracking-tighter">Kéo thả ảnh máy vào đây</p>
                            <p class="text-[10px] text-gray-400 font-bold uppercase mt-1">Hoặc bấm để chọn file</p>
                        </div>
                        <img id="img-preview" class="hidden absolute inset-0 w-full h-full object-cover rounded-2xl z-0">
                    </div>
                </div>
                <button id="btn-add-product" class="w-full mt-6 bg-emerald-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-emerald-700 transition uppercase tracking-widest active:scale-95">Đăng bán ngay</button>
            </section>

            <!-- PRODUCT GRID -->
            <div id="product-list" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <!-- Footer -->
    <footer class="bg-white border-t py-10 mt-10">
        <div class="container mx-auto px-4 text-center">
            <h4 class="text-slate-800 font-black text-lg uppercase tracking-tighter">Hồng Phúc Mobile</h4>
            <p class="text-gray-500 text-sm font-medium mt-1">29 Quang Trung, Xã Phan Rí Cửa, Lâm Đồng</p>
            <div class="h-px bg-gray-100 w-24 mx-auto my-6"></div>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.3em]">© 2026 Developed by AsherVu (UIT)</p>
        </div>
    </footer>

    <script type="module" src="hp-config.js"></script>
</body>
</html>
